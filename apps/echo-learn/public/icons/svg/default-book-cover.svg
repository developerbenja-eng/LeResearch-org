<svg width="300" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book background -->
  <rect width="300" height="400" fill="url(#bookGradient)" rx="8" ry="8"/>

  <!-- Book spine shadow -->
  <rect x="280" y="0" width="20" height="400" fill="rgba(0,0,0,0.2)" rx="0" ry="0"/>

  <!-- Title area -->
  <rect x="30" y="60" width="240" height="120" fill="rgba(255,255,255,0.1)" rx="4" ry="4"/>

  <!-- Book icon -->
  <g transform="translate(135, 200)">
    <rect x="-15" y="-20" width="30" height="40" fill="rgba(255,255,255,0.8)" rx="2" ry="2"/>
    <rect x="-12" y="-16" width="24" height="2" fill="rgba(139,92,246,0.6)"/>
    <rect x="-12" y="-10" width="24" height="2" fill="rgba(139,92,246,0.6)"/>
    <rect x="-12" y="-4" width="18" height="2" fill="rgba(139,92,246,0.6)"/>
    <rect x="-12" y="2" width="20" height="2" fill="rgba(139,92,246,0.6)"/>
    <rect x="-12" y="8" width="16" height="2" fill="rgba(139,92,246,0.6)"/>
  </g>

  <!-- Default text -->
  <text x="150" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white" font-weight="bold">
    Libro Infantil
  </text>

  <text x="150" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">
    Children's Book
  </text>

  <text x="150" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">
    Cover not available
  </text>
</svg>