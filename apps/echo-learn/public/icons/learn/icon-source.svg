<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="learnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background circle for maskable safe zone -->
  <circle cx="256" cy="256" r="256" fill="url(#learnGradient)"/>
  <!-- Graduation cap icon - centered in 40% safe zone -->
  <g transform="translate(256, 256)">
    <!-- Cap top (diamond shape) -->
    <polygon points="0,-70 100,-30 0,10 -100,-30" fill="white" opacity="0.95"/>
    <!-- Cap base -->
    <ellipse cx="0" cy="-30" rx="100" ry="25" fill="white" opacity="0.85"/>
    <!-- Tassel string -->
    <path d="M50,-30 Q70,-20 75,30" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Tassel end -->
    <circle cx="75" cy="35" r="8" fill="white" opacity="0.95"/>
    <rect x="70" y="43" width="10" height="25" rx="3" fill="white" opacity="0.9"/>
    <!-- Button on top -->
    <circle cx="0" cy="-35" r="10" fill="url(#learnGradient)"/>
    <!-- Book underneath -->
    <path d="M-60 20 L-60 70 Q-60 80 -50 80 L50 80 Q60 80 60 70 L60 20 Q0 40 -60 20 Z" fill="white" opacity="0.9"/>
    <!-- Book pages -->
    <line x1="-45" y1="45" x2="45" y2="45" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-45" y1="55" x2="45" y2="55" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-45" y1="65" x2="30" y2="65" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <!-- Decorative dots -->
    <circle cx="-90" cy="-80" r="5" fill="white" opacity="0.7"/>
    <circle cx="92" cy="-75" r="4" fill="white" opacity="0.6"/>
    <circle cx="-88" cy="70" r="3" fill="white" opacity="0.8"/>
  </g>
</svg>
