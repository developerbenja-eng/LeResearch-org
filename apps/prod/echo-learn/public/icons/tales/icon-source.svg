<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="talesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Background circle for maskable safe zone -->
  <circle cx="256" cy="256" r="256" fill="url(#talesGradient)"/>
  <!-- Book icon - centered in 40% safe zone (r=102.4, so content within ~200px from center) -->
  <g transform="translate(256, 256)">
    <!-- Open book base -->
    <path d="M-80 -60 Q-80 -80 -60 -80 L-10 -80 Q0 -80 0 -60 L0 60 Q0 80 -10 80 L-60 80 Q-80 80 -80 60 Z" fill="white" opacity="0.95"/>
    <path d="M80 -60 Q80 -80 60 -80 L10 -80 Q0 -80 0 -60 L0 60 Q0 80 10 80 L60 80 Q80 80 80 60 Z" fill="white" opacity="0.95"/>
    <!-- Book spine -->
    <path d="M-5 -75 L5 -75 L5 75 L-5 75 Z" fill="white" opacity="0.9"/>
    <!-- Page lines left -->
    <line x1="-65" y1="-50" x2="-20" y2="-50" stroke="#9333ea" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="-30" x2="-20" y2="-30" stroke="#9333ea" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="-10" x2="-20" y2="-10" stroke="#9333ea" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="10" x2="-35" y2="10" stroke="#9333ea" stroke-width="4" stroke-linecap="round"/>
    <!-- Page lines right -->
    <line x1="65" y1="-50" x2="20" y2="-50" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <line x1="65" y1="-30" x2="20" y2="-30" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <line x1="65" y1="-10" x2="20" y2="-10" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <line x1="65" y1="10" x2="35" y2="10" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <!-- Sparkle/magic stars -->
    <circle cx="-90" cy="-90" r="6" fill="white" opacity="0.8"/>
    <circle cx="95" cy="-85" r="4" fill="white" opacity="0.7"/>
    <circle cx="-85" cy="85" r="5" fill="white" opacity="0.6"/>
    <circle cx="90" cy="90" r="3" fill="white" opacity="0.8"/>
  </g>
</svg>
