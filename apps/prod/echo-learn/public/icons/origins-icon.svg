<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="originsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Outer ring - representing cycles/time -->
  <circle cx="50" cy="50" r="38" stroke="url(#originsGrad)" stroke-width="3" fill="none" opacity="0.8"/>
  <!-- Inner connections - constellation pattern -->
  <circle cx="50" cy="25" r="5" fill="url(#originsGrad)" opacity="0.9"/>
  <circle cx="75" cy="45" r="5" fill="url(#originsGrad)" opacity="0.9"/>
  <circle cx="65" cy="75" r="5" fill="url(#originsGrad)" opacity="0.9"/>
  <circle cx="35" cy="75" r="5" fill="url(#originsGrad)" opacity="0.9"/>
  <circle cx="25" cy="45" r="5" fill="url(#originsGrad)" opacity="0.9"/>
  <!-- Center node -->
  <circle cx="50" cy="50" r="8" fill="url(#originsGrad)" opacity="1"/>
  <!-- Connection lines -->
  <line x1="50" y1="25" x2="75" y2="45" stroke="url(#originsGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="75" y1="45" x2="65" y2="75" stroke="url(#originsGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="65" y1="75" x2="35" y2="75" stroke="url(#originsGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="75" x2="25" y2="45" stroke="url(#originsGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="25" y1="45" x2="50" y2="25" stroke="url(#originsGrad)" stroke-width="1.5" opacity="0.5"/>
  <!-- Lines to center -->
  <line x1="50" y1="50" x2="50" y2="25" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="50" x2="75" y2="45" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="50" x2="65" y2="75" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="50" x2="35" y2="75" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="50" x2="25" y2="45" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
